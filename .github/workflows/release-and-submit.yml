on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Upload Release Asset and submit a PR to docker-mediawiki repository

jobs:
  build:
    runs-on: ubuntu-18.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '7.3'
          tools: composer:v1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning] no dependency caching is enabled (no cache input) and the workflow only runs on trusted tag pushes
        with:
          node-version: 14

      - name: Set tag name
        id: tag_name
        run: echo "::set-output name=tag_name::$(basename ${GITHUB_REF})"
      - name: Build project
        run: |
          composer update --no-dev
          yarn --prod
          tar --exclude-vcs -C .. -zcvf "../${STEPS_TAG_NAME_OUTPUTS_TAG_NAME}.tar.gz" "$(basename "$(pwd)")"
          mv ../${STEPS_TAG_NAME_OUTPUTS_TAG_NAME}.tar.gz ./
        env:
          STEPS_TAG_NAME_OUTPUTS_TAG_NAME: ${{ steps.tag_name.outputs.tag_name }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4 # zizmor: ignore[archived-uses] template-managed workflow pins the archived official release action by SHA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2 # zizmor: ignore[archived-uses] template-managed workflow pins the archived official release action by SHA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ steps.tag_name.outputs.tag_name }}.tar.gz
          asset_name: ${{ steps.tag_name.outputs.tag_name }}.tar.gz
          asset_content_type: application/zip

      - name: Submit a PR
        run: |
          if [ '${GITHUB_EVENT_REPOSITORY_NAME}' = 'FemiwikiSkin' ]; then
            EXTENSION=Femiwiki
          else
            EXTENSION=${GITHUB_EVENT_REPOSITORY_NAME}
          fi
          curl \
            --fail \
            --request POST \
            --url https://api.github.com/repos/femiwiki/docker-mediawiki/dispatches \
            --header "Authorization: token ${{ secrets.BOT_TOKEN }}" \
            --header 'content-type: application/json' \
            --data "{
              \"event_type\": \"bump-extension\",
              \"client_payload\": {
                \"extension\": \"$EXTENSION\",
                \"version\": \"${STEPS_TAG_NAME_OUTPUTS_TAG_NAME}\"
              }
            }"
        env:
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}
          STEPS_TAG_NAME_OUTPUTS_TAG_NAME: ${{ steps.tag_name.outputs.tag_name }}
